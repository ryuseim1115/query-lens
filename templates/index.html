<!DOCTYPE html>

<body>
    <button id="openCsvFileList">解析可能なCSVファイル一覧の表示</button>
    <dialog id="csvFileList">
        <h2>解析対象ファイル</h2>
        <small id="csvFilePath"></small>
        <ul id="csvFileItems"></ul>
        <button id="closeCsvFileList">閉じる</button>
    </dialog>
    <script src="/static/main_page.js"></script>


    <form id="queryForm">
        <label for="sqlInput">SQL入力欄</label><textarea cols="50" rows="5" id="sqlInput" type="text"
            name="query"></textarea>
        <button type="submit">解析</button>
    </form>
    <div id="coloredSqlDisplay" style="border:1px solid #ccc; padding:8px; min-height:40px; background:#f9f9f9;"></div>
    <script type="module" src="/static/run_query.js"></script>
    <script type="module" src="/static/display_sql_result.js"></script>

    <p id="error_message" style="color: red;"></p>
    <svg id="tables"></svg>
    <table id="analysis_result"></table>

</body>
