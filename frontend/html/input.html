<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>QueryLens</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/input.css" />
  </head>

  <body>
    <header>
      <div class="logo">Query<span>Lens</span></div>
    </header>

    <main>
      <div class="query-form">
        <form>
          <div class="query-header-row">
            <label>クエリ</label>
            <div class="database-type-row">
              <label>DB タイプ</label>
              <select name="databaseType">
                <option value="mysql">MySQL</option>
                <option value="postgresql">PostgreSQL</option>
                <option value="sqlite">SQLite</option>
              </select>
            </div>
          </div>
          <textarea
            name="query"
            spellcheck="false"
          ></textarea>
        </form>

        <div class="form-btn-row">
          <button class="analysis-btn">解析</button>
          <button class="open-csv-btn">CSVファイル確認</button>
        </div>

        <div class="query-error"></div>
      </div>
    </main>

    <dialog class="csv-file-dialog">
      <h2>解析対象ファイル</h2>
      <small class="csv-file-path"></small>
      <ol class="csv-file-names"></ol>
      <div class="dialog-btn-row">
        <button class="determine-btn">解析対象を確定する</button>
        <button class="close-btn">閉じる</button>
      </div>
      <div class="dialog-error"></div>
    </dialog>

    <script type="module" src="/static/pages/input/CsvDialog.js"></script>
    <script type="module" src="/static/pages/input/Analysis.js"></script>
  </body>
</html>
