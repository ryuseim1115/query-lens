<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueryLens</title>
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>

<header>
  <div class="logo">Query<span>Lens</span></div>
</header>

<main>
  <div class="form-card">
    <h2>SQLクエリを入力して解析を開始</h2>

    <form id="queryForm">
      <div class="field-row" style="margin-bottom:0.5rem;">
        <label for="databaseType">DB タイプ</label>
        <select name="databaseType" id="databaseType">
          <option value="mysql">MySQL</option>
          <option value="postgresql">PostgreSQL</option>
          <option value="sqlite">SQLite</option>
        </select>
      </div>
      <textarea id="queryInput" name="query" spellcheck="false"
        placeholder="SELECT ... FROM ..."></textarea>
    </form>

    <div class="btn-row">
      <button class="primary" id="analysisStartBtn">🔍 解析</button>
      <button class="secondary" id="openCsvFileList">CSVファイル確認</button>
    </div>

    <div class="error-msg" id="errorMessage"></div>
  </div>
</main>

<dialog id="csvFileList">
  <h2>解析対象ファイル</h2>
  <small id="csvFilePath"></small>
  <ol id="csvFileItems"></ol>
  <div class="dialog-footer">
    <button class="primary" id="determineCsvFile">解析対象を確定する</button>
    <button class="secondary" id="closeCsvFileList">閉じる</button>
  </div>
  <div class="dialog-error" id="csvFileErrorMessage"></div>
</dialog>

<script type="module" src="/static/pages/input/CsvDialog.js"></script>
<script type="module" src="/static/pages/input/Analysis.js"></script>
</body>
</html>
