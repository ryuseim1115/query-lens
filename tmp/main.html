<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueryLens</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1e2330;
      --border:    #2d3448;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #60a5fa;
      --highlight: #1e3a5f;
      --error-bg:  #2d1515;
      --error-bd:  #7f1d1d;
      --error-tx:  #fca5a5;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-size: 1.15rem; font-weight: 700; color: #fff; }
    .logo span { color: var(--accent); }
    .conn-info { font-size: 0.78rem; color: var(--muted); }
    .conn-info strong { color: #94a3b8; }

    /* ── Main layout ── */
    .workspace {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ── SQL Panel ── */
    .sql-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-header {
      padding: 0.5rem 1rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sqlInput {
      flex: 1;
      background: var(--bg);
      border: none;
      padding: 1rem;
      color: var(--text);
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    .sql-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    button.run {
      background: #2563eb;
      border: none;
      border-radius: 5px;
      padding: 0.4rem 1.1rem;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button.run:hover { background: #1d4ed8; }

    .error-inline {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      border-radius: 5px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      color: var(--error-tx);
      flex: 1;
    }
    .error-inline.visible { display: block; }

    /* ── Result Panel ── */
    .result-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .result-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
    }

    .empty-hint {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1rem 0;
    }

    /* subquery group */
    .sq-group {
      margin-bottom: 1rem;
    }
    .sq-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
    }
    .sq-header:hover { background: #252d3f; border-color: #3d4d6a; }
    .sq-header.active {
      background: var(--highlight);
      border-color: var(--accent);
      color: var(--accent);
    }
    .sq-arrow { font-size: 0.7rem; transition: transform 0.15s; }
    .sq-header.active .sq-arrow { transform: rotate(90deg); }

    .table-list {
      margin-top: 0.4rem;
      padding-left: 0.5rem;
      display: none;
    }
    .sq-header.active + .table-list { display: block; }

    .table-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin: 0.25rem 0.25rem 0.25rem 0;
      padding: 0.25rem 0.65rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-family: monospace;
      background: #1a2535;
      border: 1px solid #2d3f5a;
      color: #93c5fd;
      transition: background 0.15s, border-color 0.15s;
    }
    .table-chip.lit {
      background: #1e3a5f;
      border-color: var(--accent);
      color: #bfdbfe;
    }
    .table-icon { font-size: 0.75rem; }

    /* ── Preview Panel ── */
    .preview-panel {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      height: 200px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-body {
      flex: 1;
      overflow: auto;
      padding: 0.5rem 1rem;
    }

    .preview-hint {
      color: var(--muted);
      font-size: 0.82rem;
      padding: 0.5rem 0;
    }

    table.preview-table {
      border-collapse: collapse;
      font-size: 0.8rem;
      font-family: monospace;
      width: 100%;
    }
    table.preview-table th {
      background: #252d3f;
      color: #93c5fd;
      padding: 0.35rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    table.preview-table td {
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--border);
      color: #cbd5e1;
      white-space: nowrap;
    }
    table.preview-table tr:nth-child(even) td { background: #161b27; }

    /* ── SQL highlight overlay ── */
    .sql-highlight-wrap {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .sq-tag {
      display: inline-block;
      background: #1e3a5f44;
      border-bottom: 2px solid var(--accent);
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s;
    }
    .sq-tag:hover, .sq-tag.active { background: #1e3a5f99; }
  </style>
</head>
<body>

<header>
  <div class="logo">Query<span>Lens</span></div>
  <div class="conn-info" id="connInfo">接続先: <strong>—</strong></div>
</header>

<div class="workspace">
  <div class="panels">

    <!-- SQL 入力パネル -->
    <div class="sql-panel">
      <div class="panel-header">SQL 入力</div>
      <textarea id="sqlInput" spellcheck="false" placeholder="ここにSQLを入力...

例:
SELECT sub.name, p.title
FROM (
  SELECT c.id, c.name
  FROM customers c
  JOIN orders o ON c.id = o.customer_id
) sub
JOIN purchases p ON sub.id = p.customer_id"></textarea>
      <div class="sql-toolbar">
        <button class="run" onclick="runSQL()">▶ 実行</button>
        <div class="error-inline" id="errorInline"></div>
      </div>
    </div>

    <!-- 解析結果パネル -->
    <div class="result-panel">
      <div class="panel-header">解析結果</div>
      <div class="result-body" id="resultBody">
        <div class="empty-hint">SQLを入力して実行すると、サブクエリとテーブルの一覧が表示されます。</div>
      </div>
    </div>

  </div><!-- /panels -->

  <!-- プレビューパネル -->
  <div class="preview-panel">
    <div class="panel-header">プレビュー <span id="previewLabel" style="color:#60a5fa;font-size:0.75rem;margin-left:0.5rem;text-transform:none;letter-spacing:0;"></span></div>
    <div class="preview-body" id="previewBody">
      <div class="preview-hint">サブクエリを選択すると、その時点での中間データが表示されます。</div>
    </div>
  </div>
</div>

<script>
// ── URL params ──────────────────────────────────────────
const params = new URLSearchParams(location.search);
const connLabel = [params.get('host'), params.get('dbname')].filter(Boolean).join('/') || 'localhost/demo';
document.getElementById('connInfo').innerHTML = `接続先: <strong>${connLabel}</strong>`;

// ── Mock subquery data ───────────────────────────────────
// 実際の解析はバックエンドで行う。ここはデモ用モック。
const MOCK_RESULT = [
  {
    label: 'サブクエリ ①',
    alias: 'sub',
    tables: ['customers', 'orders'],
    preview: {
      columns: ['id', 'name', 'order_count'],
      rows: [
        [1, '山田 太郎', 3],
        [2, '鈴木 花子', 1],
        [3, '佐藤 次郎', 5],
        [4, '田中 美咲', 2],
      ]
    }
  },
  {
    label: 'サブクエリ ②（外側）',
    alias: 'outer',
    tables: ['customers', 'orders', 'purchases'],
    preview: {
      columns: ['name', 'title', 'amount'],
      rows: [
        ['山田 太郎', '商品A', '¥3,200'],
        ['山田 太郎', '商品C', '¥800'],
        ['鈴木 花子', '商品B', '¥1,500'],
        ['佐藤 次郎', '商品A', '¥3,200'],
        ['佐藤 次郎', '商品D', '¥2,100'],
      ]
    }
  }
];

let selectedIdx = null;

// ── Run SQL ──────────────────────────────────────────────
function runSQL() {
  const sql = document.getElementById('sqlInput').value.trim();
  const errorEl = document.getElementById('errorInline');

  errorEl.classList.remove('visible');
  selectedIdx = null;
  clearPreview();

  if (!sql) {
    showError('SQLを入力してください。');
    return;
  }

  // 簡易バリデーション（デモ）
  if (!/^\s*SELECT/i.test(sql)) {
    showError('SELECT 文のみ対応しています。');
    return;
  }
  if (sql.length < 10) {
    showError('構文エラー: SQLが短すぎます。');
    return;
  }

  renderResults(MOCK_RESULT);
}

function showError(msg) {
  const el = document.getElementById('errorInline');
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
  document.getElementById('resultBody').innerHTML =
    '<div class="empty-hint">解析に失敗しました。SQLを修正して再実行してください。</div>';
}

// ── Render results ───────────────────────────────────────
function renderResults(data) {
  const body = document.getElementById('resultBody');
  body.innerHTML = '';

  data.forEach((sq, idx) => {
    const group = document.createElement('div');
    group.className = 'sq-group';

    const header = document.createElement('div');
    header.className = 'sq-header';
    header.innerHTML = `<span class="sq-arrow">▶</span> ${sq.label}`;
    header.addEventListener('click', () => selectSubquery(idx, data, header));

    const chipWrap = document.createElement('div');
    chipWrap.className = 'table-list';
    chipWrap.id = `tables-${idx}`;
    sq.tables.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'table-chip';
      chip.id = `chip-${idx}-${t}`;
      chip.innerHTML = `<span class="table-icon">▦</span>${t}`;
      chipWrap.appendChild(chip);
    });

    group.appendChild(header);
    group.appendChild(chipWrap);
    body.appendChild(group);
  });
}

// ── Select subquery ──────────────────────────────────────
function selectSubquery(idx, data, clickedHeader) {
  const sq = data[idx];

  // toggle: 同じものを再クリックで解除
  if (selectedIdx === idx) {
    selectedIdx = null;
    clickedHeader.classList.remove('active');
    clearPreview();
    return;
  }

  // 前の選択を解除
  document.querySelectorAll('.sq-header').forEach(h => h.classList.remove('active'));
  document.querySelectorAll('.table-chip').forEach(c => c.classList.remove('lit'));

  selectedIdx = idx;
  clickedHeader.classList.add('active');

  // そのサブクエリのテーブルをハイライト
  sq.tables.forEach(t => {
    const chip = document.getElementById(`chip-${idx}-${t}`);
    if (chip) chip.classList.add('lit');
  });

  renderPreview(sq);
}

// ── Preview ──────────────────────────────────────────────
function renderPreview(sq) {
  document.getElementById('previewLabel').textContent = `— ${sq.label} の中間データ`;

  const { columns, rows } = sq.preview;
  const table = document.createElement('table');
  table.className = 'preview-table';

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  columns.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  rows.forEach(r => {
    const tr = document.createElement('tr');
    r.forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  const body = document.getElementById('previewBody');
  body.innerHTML = '';
  body.appendChild(table);
}

function clearPreview() {
  document.getElementById('previewLabel').textContent = '';
  document.getElementById('previewBody').innerHTML =
    '<div class="preview-hint">サブクエリを選択すると、その時点での中間データが表示されます。</div>';
}

// ── Enter shortcut (Ctrl/Cmd + Enter) ───────────────────
document.getElementById('sqlInput').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runSQL();
});
</script>
</body>
</html>
